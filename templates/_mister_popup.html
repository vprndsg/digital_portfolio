<div class="mister-popup" id="misterPopup" hidden>
    <div class="mister-popup__backdrop" data-mister-popup-close></div>
    <section
        class="mister-popup__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="misterPopupTitle"
        aria-describedby="misterPopupBody"
    >
        <button class="mister-popup__close" type="button" data-mister-popup-close aria-label="Close Mister's picks popup">
            <span aria-hidden="true">&times;</span>
        </button>

        <div class="mister-popup__inner">
            <p class="mister-popup__eyebrow">Mister's newsletter</p>
            <h2 id="misterPopupTitle">Join Mister's Newsletter</h2>

            <div class="mister-popup__frame">
                <img
                    src="{{ url_for('static', filename='media/mister-picks.jpg') }}"
                    alt="Mister peeking between wine bottles like a very tiny sommelier."
                >
            </div>

            <p class="mister-popup__body" id="misterPopupBody">
                Get 10% off Mister's wine of the week!
            </p>

            <form class="mister-popup__form" data-mister-popup-form novalidate>
                <label class="mister-popup__sr-only" for="misterPopupEmail">Email address</label>
                <input
                    class="mister-popup__input"
                    id="misterPopupEmail"
                    name="email"
                    type="email"
                    inputmode="email"
                    autocomplete="email"
                    placeholder="Enter your email address"
                    aria-describedby="misterPopupMessage"
                    required
                >
                <button class="mister-popup__cta" type="submit">Subscribe</button>
            </form>

            <p class="mister-popup__message" id="misterPopupMessage" aria-live="polite"></p>
        </div>
    </section>
</div>
