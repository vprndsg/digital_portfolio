<div class="mister-popup" id="misterPopup" hidden>
    <div class="mister-popup__backdrop" data-mister-popup-close></div>
    <section
        class="mister-popup__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="misterPopupTitle"
        aria-describedby="misterPopupBody"
    >
        <button class="mister-popup__close" type="button" data-mister-popup-close aria-label="Close Mister's picks popup">
            <span aria-hidden="true">&times;</span>
        </button>

        <div class="mister-popup__inner">
            <p class="mister-popup__eyebrow">Mister's picks</p>
            <h2 id="misterPopupTitle">Start with Mister's Picks</h2>

            <div class="mister-popup__frame">
                <img
                    src="{{ url_for('static', filename='media/mister-picks.jpg') }}"
                    alt="Mister peeking between wine bottles like a very tiny sommelier."
                >
            </div>

            <p class="mister-popup__lead">A quick recommendation from the house.</p>
            <p class="mister-popup__body" id="misterPopupBody">
                Begin with the real email campaigns, the vineyard dinner case study, and the live editorial demo.
            </p>

            <div class="mister-popup__actions">
                <a class="mister-popup__cta" href="{{ url_for('portfolio_home') }}#work" data-mister-popup-dismiss>
                    Explore the portfolio
                </a>
            </div>
        </div>
    </section>
</div>
