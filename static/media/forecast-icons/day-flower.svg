<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Flower day icon</title>
  <desc id="desc">A bloom with a bright center inside a soft celestial badge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5b2d6d"/>
      <stop offset="100%" stop-color="#1b1528"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffb5ef"/>
      <stop offset="100%" stop-color="#f073cb"/>
    </linearGradient>
  </defs>
  <circle cx="80" cy="80" r="74" fill="url(#bg)"/>
  <g transform="translate(80 80)">
    <ellipse rx="14" ry="34" fill="url(#petal)" transform="rotate(0) translate(0 -24)"/>
    <ellipse rx="14" ry="34" fill="url(#petal)" transform="rotate(72) translate(0 -24)"/>
    <ellipse rx="14" ry="34" fill="url(#petal)" transform="rotate(144) translate(0 -24)"/>
    <ellipse rx="14" ry="34" fill="url(#petal)" transform="rotate(216) translate(0 -24)"/>
    <ellipse rx="14" ry="34" fill="url(#petal)" transform="rotate(288) translate(0 -24)"/>
  </g>
  <circle cx="80" cy="80" r="18" fill="#ffe39d"/>
  <circle cx="80" cy="80" r="8" fill="#ffb33e"/>
  <path d="M80 104 V128" stroke="#8ad39d" stroke-width="6" stroke-linecap="round"/>
  <path d="M80 116 c-10 -4 -18 -2 -24 8" fill="none" stroke="#8ad39d" stroke-width="5" stroke-linecap="round"/>
  <path d="M80 120 c10 -6 18 -6 24 4" fill="none" stroke="#8ad39d" stroke-width="5" stroke-linecap="round"/>
</svg>
